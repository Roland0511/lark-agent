control_plane:
  url: "https://agent.example.internal"
  device_token_file: "/absolute/path/to/Lark Agent Runner/mac-example/credentials"

executor:
  id: "mac-he-lark-agent"
  display_name: "Mac · Lark Agent"
  codex_home: "/absolute/path/to/codex-home"
  codex_profile: "lark-agent"
  codex_binary: "codex"
  runtime_state_dir: "/absolute/path/to/Lark Agent Runner/mac-example/state"
  runner_version: "0.4.4"
  capacity: 1
  app_launcher: "/absolute/path/to/lark-agent/scripts/open-codex-app.sh"
  capabilities:
    - codex
    - app_handoff
    - chat_context_v1
    - skillhub_skills_v1
    - skill_runtime_config_v1
    - user_skills_inventory_v1
  workspace_roots:
    - alias: "artist-toolbox"
      path: "/absolute/path/to/workspace"
