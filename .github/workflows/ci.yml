name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: lark_agent_test
          POSTGRES_USER: lark_agent
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lark_agent -d lark_agent_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      TEST_DATABASE_URL: postgresql://lark_agent:test-password@127.0.0.1:5432/lark_agent_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install zsh for macOS Runner CLI tests
        run: sudo apt-get update && sudo apt-get install -y zsh
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:public
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: docker compose --env-file .env.example config --quiet
      - run: docker compose --env-file .env.example -f compose.yaml -f compose.host.yaml config --quiet
